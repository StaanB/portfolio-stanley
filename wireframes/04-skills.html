<!-- @dsCard group="Wireframe — Seções" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wireframe — Skills</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; background: #fff; color: #111; }
  .section { min-height: 100vh; padding: 80px 64px; border: 2px dashed #ccc; }
  .label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 24px; }
  .title { font-size: 28px; font-weight: 900; margin-bottom: 40px; }
  .groups { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .group h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 16px; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { border: 1px solid #ccc; padding: 6px 12px; font-size: 12px; color: #444; }
</style>
</head>
<body>
  <section class="section">
    <div class="label">04 — Skills / Stack</div>
    <h2 class="title">Skills</h2>
    <div class="groups">
      <div class="group">
        <h4>Front-end</h4>
        <div class="pills"><span class="pill">React</span><span class="pill">Next.js</span><span class="pill">TypeScript</span><span class="pill">Tailwind</span><span class="pill">SASS</span></div>
      </div>
      <div class="group">
        <h4>Back-end & Mobile</h4>
        <div class="pills"><span class="pill">Node.js</span><span class="pill">NestJS</span><span class="pill">Ruby on Rails</span><span class="pill">Flutter</span><span class="pill">Java</span><span class="pill">GraphQL</span></div>
      </div>
      <div class="group">
        <h4>IA & Dados</h4>
        <div class="pills"><span class="pill">Agentes de IA</span><span class="pill">RAG</span><span class="pill">Pinecone</span><span class="pill">Gemini</span><span class="pill">Claude Code</span></div>
      </div>
      <div class="group">
        <h4>Qualidade & Processo</h4>
        <div class="pills"><span class="pill">Jest</span><span class="pill">Cypress</span><span class="pill">Docker</span><span class="pill">Git</span><span class="pill">SCRUM</span><span class="pill">Specs técnicas</span></div>
      </div>
      <div class="group">
        <h4>Cloud/DevOps</h4>
        <div class="pills"><span class="pill">AWS</span><span class="pill">Pipelines</span><span class="pill">Automação</span></div>
      </div>
    </div>
  </section>
</body>
</html>
